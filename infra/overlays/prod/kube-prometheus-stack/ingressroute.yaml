apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-ingressroute
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`grafana.seolman.dev`)
      services:
        - name: prometheus-stack-grafana
          port: 80
  tls:
    secretName: grafana-tls
